<svg viewBox="0 0 700 330" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="330" fill="#FFF8F0"/>
  <text x="350" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">Anatomy of an AI SDK Tool</text>

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Code block background -->
    <rect x="50" y="60" width="400" height="240" fill="#1c1917" rx="8"/>

    <!-- Code lines -->
    <text x="70" y="88" font-size="12" fill="#8B6F5C" font-family="'SF Mono', 'Consolas', monospace">const getEmployees = tool({</text>

    <!-- Description line -->
    <rect x="68" y="98" width="370" height="36" fill="#2a2520" rx="4"/>
    <text x="78" y="116" font-size="11" fill="#D4A574" font-family="'SF Mono', 'Consolas', monospace">description:</text>
    <text x="78" y="130" font-size="10" fill="#a3a3a3" font-family="'SF Mono', 'Consolas', monospace">  'Get all employees...'</text>

    <!-- Input schema line -->
    <rect x="68" y="142" width="370" height="36" fill="#2a2520" rx="4"/>
    <text x="78" y="160" font-size="11" fill="#5B8A8A" font-family="'SF Mono', 'Consolas', monospace">inputSchema:</text>
    <text x="78" y="174" font-size="10" fill="#a3a3a3" font-family="'SF Mono', 'Consolas', monospace">  z.object({})</text>

    <!-- Execute line -->
    <rect x="68" y="186" width="370" height="50" fill="#2a2520" rx="4"/>
    <text x="78" y="204" font-size="11" fill="#8B6F5C" font-family="'SF Mono', 'Consolas', monospace">execute:</text>
    <text x="78" y="218" font-size="10" fill="#a3a3a3" font-family="'SF Mono', 'Consolas', monospace">  async () =&gt; {</text>
    <text x="78" y="232" font-size="10" fill="#a3a3a3" font-family="'SF Mono', 'Consolas', monospace">    return await getAllEmployees()</text>

    <text x="70" y="258" font-size="12" fill="#8B6F5C" font-family="'SF Mono', 'Consolas', monospace">})</text>

    <!-- Annotation arrows and labels -->
    <!-- Description annotation -->
    <line x1="450" y1="115" x2="490" y2="115" stroke="#D4A574" stroke-width="2"/>
    <line x1="490" y1="115" x2="520" y2="115" stroke="#D4A574" stroke-width="2"/>
    <rect x="524" y="98" width="160" height="36" fill="#D4A574" rx="4"/>
    <text x="604" y="114" font-size="10" font-weight="bold" text-anchor="middle" fill="white">What it does</text>
    <text x="604" y="128" font-size="9" text-anchor="middle" fill="#FFF0DD">The AI reads this to decide</text>

    <!-- Input schema annotation -->
    <line x1="450" y1="160" x2="490" y2="160" stroke="#5B8A8A" stroke-width="2"/>
    <line x1="490" y1="160" x2="520" y2="160" stroke="#5B8A8A" stroke-width="2"/>
    <rect x="524" y="143" width="160" height="36" fill="#5B8A8A" rx="4"/>
    <text x="604" y="159" font-size="10" font-weight="bold" text-anchor="middle" fill="white">What it needs</text>
    <text x="604" y="173" font-size="9" text-anchor="middle" fill="#C8E0E0">The AI fills this in</text>

    <!-- Execute annotation -->
    <line x1="450" y1="210" x2="490" y2="210" stroke="#8B6F5C" stroke-width="2"/>
    <line x1="490" y1="210" x2="520" y2="210" stroke="#8B6F5C" stroke-width="2"/>
    <rect x="524" y="193" width="160" height="36" fill="#8B6F5C" rx="4"/>
    <text x="604" y="209" font-size="10" font-weight="bold" text-anchor="middle" fill="white">What happens</text>
    <text x="604" y="223" font-size="9" text-anchor="middle" fill="#E0D4C8">Your code runs this</text>
  </g>
</svg>
