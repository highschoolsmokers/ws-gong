<svg viewBox="0 0 700 550" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="550" fill="#FFF8F0"/>

  <!-- Title -->
  <text x="350" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
    How the App Works
  </text>

  <!-- Subtitle -->
  <text x="350" y="60" font-size="12" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
    From opening the app to seeing your shift — the full flow
  </text>

  <!-- Step 1 -->
  <g>
    <circle cx="100" cy="120" r="35" fill="#D4A574" stroke="#8B6F5C" stroke-width="2"/>
    <text x="100" y="128" font-size="24" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      1
    </text>

    <!-- Icon: Phone with link -->
    <g transform="translate(100, 120)">
      <rect x="-12" y="-20" width="24" height="40" fill="#D4A574" stroke="white" stroke-width="1" rx="2"/>
      <circle cx="0" cy="15" r="2" fill="white"/>
    </g>

    <text x="100" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Employee opens
    </text>
    <text x="100" y="202" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      the link
    </text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <line x1="135" y1="120" x2="210" y2="120" stroke="#D4A574" stroke-width="2"/>
    <polygon points="210,120 200,115 200,125" fill="#D4A574"/>
  </g>

  <!-- Step 2 -->
  <g>
    <circle cx="280" cy="120" r="35" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="2"/>
    <text x="280" y="128" font-size="24" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      2
    </text>

    <!-- Icon: Schedule list -->
    <g transform="translate(280, 120)">
      <line x1="-8" y1="-12" x2="8" y2="-12" stroke="white" stroke-width="2"/>
      <line x1="-8" y1="-6" x2="8" y2="-6" stroke="white" stroke-width="2"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="white" stroke-width="2"/>
      <line x1="-8" y1="6" x2="8" y2="6" stroke="white" stroke-width="2"/>
    </g>

    <text x="280" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      App loads the
    </text>
    <text x="280" y="202" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      weekly schedule
    </text>
  </g>

  <!-- Arrow 2 -->
  <g>
    <line x1="315" y1="120" x2="390" y2="120" stroke="#5B8A8A" stroke-width="2"/>
    <polygon points="390,120 380,115 380,125" fill="#5B8A8A"/>
  </g>

  <!-- Step 3 -->
  <g>
    <circle cx="460" cy="120" r="35" fill="#8B6F5C" stroke="#5C4538" stroke-width="2"/>
    <text x="460" y="128" font-size="24" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      3
    </text>

    <!-- Icon: Eye looking -->
    <g transform="translate(460, 120)">
      <circle cx="-5" cy="0" r="4" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="-5" cy="0" r="2" fill="white"/>
      <circle cx="5" cy="0" r="4" fill="none" stroke="white" stroke-width="2"/>
      <circle cx="5" cy="0" r="2" fill="white"/>
    </g>

    <text x="460" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Employee sees
    </text>
    <text x="460" y="202" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      their shifts
    </text>
  </g>

  <!-- Arrow 3 -->
  <g>
    <line x1="495" y1="120" x2="570" y2="120" stroke="#8B6F5C" stroke-width="2"/>
    <polygon points="570,120 560,115 560,125" fill="#8B6F5C"/>
  </g>

  <!-- Step 4 -->
  <g>
    <circle cx="640" cy="120" r="35" fill="#D4A574" stroke="#8B6F5C" stroke-width="2"/>
    <text x="640" y="128" font-size="24" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      4
    </text>

    <!-- Icon: Checkmark -->
    <g transform="translate(640, 120)">
      <path d="M -8 0 L -2 6 L 8 -4" fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    </g>

    <text x="640" y="185" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Everyone
    </text>
    <text x="640" y="202" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      knows the plan
    </text>
  </g>

  <!-- Bottom section: Manager workflow -->
  <rect x="40" y="260" width="620" height="260" fill="#E8D9CB" stroke="#5B8A8A" stroke-width="2" rx="8"/>

  <text x="350" y="290" font-size="16" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
    Manager View: Creating the Schedule
  </text>

  <!-- Manager step 1 -->
  <g>
    <rect x="65" y="320" width="140" height="140" fill="white" stroke="#D4A574" stroke-width="2" rx="6"/>

    <text x="135" y="345" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Manager clicks
    </text>
    <text x="135" y="362" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      "Assign Alvin"
    </text>

    <!-- Icon: Calendar with click -->
    <g transform="translate(135, 385)">
      <rect x="-15" y="-15" width="30" height="30" fill="none" stroke="#D4A574" stroke-width="2" rx="2"/>
      <line x1="-15" y1="-8" x2="15" y2="-8" stroke="#D4A574" stroke-width="1"/>
      <line x1="-5" y1="-6" x2="-5" y2="5" stroke="#D4A574" stroke-width="1"/>
      <line x1="5" y1="-6" x2="5" y2="5" stroke="#D4A574" stroke-width="1"/>
      <circle cx="8" cy="8" r="3" fill="#D4A574" opacity="0.5"/>
    </g>
  </g>

  <!-- Arrow to step 2 -->
  <g>
    <path d="M 205 390 L 245 390" stroke="#5B8A8A" stroke-width="2" fill="none" marker-end="url(#arrowhead-teal)"/>
  </g>

  <!-- Manager step 2 -->
  <g>
    <rect x="245" y="320" width="140" height="140" fill="white" stroke="#5B8A8A" stroke-width="2" rx="6"/>

    <text x="315" y="345" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Change saves
    </text>
    <text x="315" y="362" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      to database
    </text>

    <!-- Icon: Lightning bolt (instant) -->
    <g transform="translate(315, 385)">
      <path d="M 0 -12 L 6 -2 L 0 0 L 6 12 L -6 4 L 0 2 Z" fill="#5B8A8A"/>
    </g>
  </g>

  <!-- Arrow to step 3 -->
  <g>
    <path d="M 385 390 L 425 390" stroke="#8B6F5C" stroke-width="2" fill="none" marker-end="url(#arrowhead-brown)"/>
  </g>

  <!-- Manager step 3 -->
  <g>
    <rect x="425" y="320" width="140" height="140" fill="white" stroke="#8B6F5C" stroke-width="2" rx="6"/>

    <text x="495" y="345" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Everyone's app
    </text>
    <text x="495" y="362" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      updates instantly
    </text>

    <!-- Icon: Phone notification -->
    <g transform="translate(495, 385)">
      <rect x="-12" y="-15" width="24" height="30" fill="none" stroke="#8B6F5C" stroke-width="2" rx="2"/>
      <circle cx="0" cy="5" r="4" fill="#8B6F5C" opacity="0.4"/>
      <circle cx="0" cy="5" r="2.5" fill="#8B6F5C"/>
      <circle cx="-4" cy="5" r="2" fill="none" stroke="#8B6F5C" stroke-width="1"/>
      <circle cx="4" cy="5" r="2" fill="none" stroke="#8B6F5C" stroke-width="1"/>
    </g>
  </g>

  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#5B8A8A"/>
    </marker>
    <marker id="arrowhead-brown" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B6F5C"/>
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="350" y="495" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
    All updates happen in real-time. No refreshing. No confusion.
  </text>
</svg>
