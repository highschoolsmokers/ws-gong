<svg viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="400" fill="#FFF8F0"/>

  <!-- Title -->
  <text x="350" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
    Our Tools: The Tech Stack
  </text>

  <!-- Subtitle -->
  <text x="350" y="60" font-size="13" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
    Three tools work together to build and run the app
  </text>

  <!-- Box 1: Next.js (left) -->
  <g>
    <!-- Main box -->
    <rect x="40" y="110" width="160" height="200" fill="#F5E6D3" stroke="#D4A574" stroke-width="2" rx="8"/>

    <!-- Icon: Code brackets -->
    <g transform="translate(120, 140)">
      <text x="0" y="0" font-size="32" text-anchor="middle" fill="#D4A574" font-family="monospace">&lt;</text>
      <text x="0" y="30" font-size="32" text-anchor="middle" fill="#D4A574" font-family="monospace">&gt;</text>
    </g>

    <!-- Label -->
    <text x="120" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Next.js
    </text>

    <!-- Description -->
    <text x="120" y="235" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      Builds the app
    </text>
    <text x="120" y="250" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      (the code that
    </text>
    <text x="120" y="263" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      makes it work)
    </text>

    <!-- Arrow down indicator -->
    <line x1="120" y1="280" x2="120" y2="310" stroke="#D4A574" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Arrow definitions -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#5B8A8A"/>
    </marker>
    <marker id="arrowhead-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#D4A574"/>
    </marker>
  </defs>

  <!-- Box 2: Vercel (middle) -->
  <g>
    <!-- Main box -->
    <rect x="270" y="110" width="160" height="200" fill="#E8D9CB" stroke="#5B8A8A" stroke-width="2" rx="8"/>

    <!-- Icon: Cloud/globe -->
    <g transform="translate(350, 135)">
      <circle cx="0" cy="0" r="20" fill="none" stroke="#5B8A8A" stroke-width="2"/>
      <circle cx="-10" cy="-5" r="8" fill="none" stroke="#5B8A8A" stroke-width="2"/>
      <circle cx="10" cy="-8" r="7" fill="none" stroke="#5B8A8A" stroke-width="2"/>
      <circle cx="0" cy="12" r="6" fill="none" stroke="#5B8A8A" stroke-width="2"/>
    </g>

    <!-- Label -->
    <text x="350" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Vercel
    </text>

    <!-- Description -->
    <text x="350" y="235" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      Hosts it online
    </text>
    <text x="350" y="250" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      (puts your app
    </text>
    <text x="350" y="263" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      on the internet)
    </text>

    <!-- Arrow down indicator -->
    <line x1="350" y1="280" x2="350" y2="310" stroke="#5B8A8A" stroke-width="2"/>
  </g>

  <!-- Box 3: Neon (right) -->
  <g>
    <!-- Main box -->
    <rect x="500" y="110" width="160" height="200" fill="#F5E6D3" stroke="#8B6F5C" stroke-width="2" rx="8"/>

    <!-- Icon: Database -->
    <g transform="translate(580, 135)">
      <rect x="-15" y="-8" width="30" height="12" fill="none" stroke="#8B6F5C" stroke-width="2" rx="2"/>
      <line x1="-15" y1="-2" x2="15" y2="-2" stroke="#8B6F5C" stroke-width="1"/>
      <line x1="-15" y1="4" x2="15" y2="4" stroke="#8B6F5C" stroke-width="1"/>
      <path d="M -15 10 Q -15 18 -5 18 Q 0 18 5 18 Q 15 18 15 10" fill="none" stroke="#8B6F5C" stroke-width="2"/>
    </g>

    <!-- Label -->
    <text x="580" y="210" font-size="14" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
      Neon
    </text>

    <!-- Description -->
    <text x="580" y="235" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      Stores the data
    </text>
    <text x="580" y="250" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      (saves the schedule
    </text>
    <text x="580" y="263" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
      in the database)
    </text>
  </g>

  <!-- Connection flow -->
  <!-- Left arrow: Next.js to Vercel -->
  <g>
    <line x1="200" y1="210" x2="270" y2="210" stroke="#D4A574" stroke-width="2"/>
    <polygon points="270,210 260,205 260,215" fill="#D4A574"/>
    <text x="235" y="200" font-size="10" text-anchor="middle" fill="#D4A574" font-family="system-ui, -apple-system, sans-serif">deploy</text>
  </g>

  <!-- Right arrow: Vercel to Neon -->
  <g>
    <line x1="430" y1="210" x2="500" y2="210" stroke="#5B8A8A" stroke-width="2"/>
    <polygon points="500,210 490,205 490,215" fill="#5B8A8A"/>
    <text x="465" y="200" font-size="10" text-anchor="middle" fill="#5B8A8A" font-family="system-ui, -apple-system, sans-serif">read/write</text>
  </g>

  <!-- Bottom explanation box -->
  <rect x="60" y="330" width="580" height="50" fill="#E8D9CB" stroke="#5B8A8A" stroke-width="1" rx="6"/>

  <text x="350" y="352" font-size="12" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif" font-weight="bold">
    How it flows: You write code in Next.js → Deploy to Vercel → Vercel reads &amp; writes data to Neon
  </text>
  <text x="350" y="370" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
    When you change the schedule, it's saved instantly in Neon. Everyone sees it right away.
  </text>
</svg>
