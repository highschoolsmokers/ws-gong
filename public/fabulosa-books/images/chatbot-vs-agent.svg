<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="380" fill="#FFF8F0"/>
  <text x="350" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">Chatbot vs. Agent</text>

  <!-- Left: Chatbot -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="30" y="60" width="290" height="300" fill="#F5E6D3" stroke="#D4A574" stroke-width="2" rx="8"/>
    <text x="175" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#8B6F5C">Chatbot</text>
    <text x="175" y="108" font-size="10" text-anchor="middle" fill="#5B5B5B">Can only talk</text>

    <!-- Simple flow -->
    <rect x="60" y="130" width="230" height="36" fill="white" stroke="#D4A574" stroke-width="1" rx="4"/>
    <text x="175" y="153" font-size="11" text-anchor="middle" fill="#6B2D3E">User: "Who's free Thursday?"</text>

    <!-- Single arrow down -->
    <line x1="175" y1="166" x2="175" y2="190" stroke="#D4A574" stroke-width="2"/>
    <polygon points="175,195 170,185 180,185" fill="#D4A574"/>

    <!-- AI thinks -->
    <rect x="60" y="200" width="230" height="36" fill="#D4A574" stroke="#8B6F5C" stroke-width="1" rx="4"/>
    <text x="175" y="223" font-size="11" text-anchor="middle" fill="white">AI: "I'd need to check..."</text>

    <!-- X mark -->
    <g transform="translate(175, 280)">
      <circle cx="0" cy="0" r="22" fill="none" stroke="#D4A574" stroke-width="2"/>
      <line x1="-10" y1="-10" x2="10" y2="10" stroke="#D4A574" stroke-width="3"/>
      <line x1="10" y1="-10" x2="-10" y2="10" stroke="#D4A574" stroke-width="3"/>
    </g>
    <text x="175" y="320" font-size="11" text-anchor="middle" fill="#8B6F5C">No tools. No action.</text>
  </g>

  <!-- VS -->
  <text x="350" y="220" font-size="18" font-weight="bold" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">VS</text>

  <!-- Right: Agent -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="380" y="60" width="290" height="300" fill="#E8EDE8" stroke="#5B8A8A" stroke-width="2" rx="8"/>
    <text x="525" y="90" font-size="16" font-weight="bold" text-anchor="middle" fill="#3D6B6B">Agent</text>
    <text x="525" y="108" font-size="10" text-anchor="middle" fill="#5B5B5B">Has tools. Takes action.</text>

    <!-- Flow with loop -->
    <rect x="410" y="122" width="230" height="28" fill="white" stroke="#5B8A8A" stroke-width="1" rx="4"/>
    <text x="525" y="141" font-size="10" text-anchor="middle" fill="#6B2D3E">User: "Who's free Thursday?"</text>

    <line x1="525" y1="150" x2="525" y2="162" stroke="#5B8A8A" stroke-width="1.5"/>
    <polygon points="525,165 521,159 529,159" fill="#5B8A8A"/>

    <rect x="410" y="168" width="230" height="24" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="1" rx="4"/>
    <text x="525" y="184" font-size="10" text-anchor="middle" fill="white">Think: "I need to check the DB"</text>

    <line x1="525" y1="192" x2="525" y2="200" stroke="#5B8A8A" stroke-width="1.5"/>
    <polygon points="525,203 521,197 529,197" fill="#5B8A8A"/>

    <rect x="410" y="206" width="230" height="24" fill="#8B6F5C" stroke="#5C4538" stroke-width="1" rx="4"/>
    <text x="525" y="222" font-size="10" text-anchor="middle" fill="white">Tool: getSchedule(thursday)</text>

    <line x1="525" y1="230" x2="525" y2="238" stroke="#5B8A8A" stroke-width="1.5"/>
    <polygon points="525,241 521,235 529,235" fill="#5B8A8A"/>

    <rect x="410" y="244" width="230" height="24" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="1" rx="4"/>
    <text x="525" y="260" font-size="10" text-anchor="middle" fill="white">Think: "Now check employee list"</text>

    <line x1="525" y1="268" x2="525" y2="276" stroke="#5B8A8A" stroke-width="1.5"/>
    <polygon points="525,279 521,273 529,273" fill="#5B8A8A"/>

    <rect x="410" y="282" width="230" height="24" fill="#8B6F5C" stroke="#5C4538" stroke-width="1" rx="4"/>
    <text x="525" y="298" font-size="10" text-anchor="middle" fill="white">Tool: getEmployees()</text>

    <line x1="525" y1="306" x2="525" y2="314" stroke="#5B8A8A" stroke-width="1.5"/>
    <polygon points="525,317 521,311 529,311" fill="#5B8A8A"/>

    <rect x="410" y="320" width="230" height="28" fill="white" stroke="#5B8A8A" stroke-width="1" rx="4"/>
    <text x="525" y="338" font-size="10" text-anchor="middle" fill="#3D6B6B">"Dylan, Joel, Carly are free"</text>
  </g>
</svg>
