<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#FFF8F0"/>
  <text x="350" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">The Complete System</text>
  <text x="350" y="50" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">Everything deployed on Vercel</text>

  <defs>
    <marker id="ac" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5B8A8A"/>
    </marker>
  </defs>

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Vercel hosting container -->
    <rect x="30" y="60" width="640" height="400" fill="none" stroke="#5B8A8A" stroke-width="2" stroke-dasharray="6,4" rx="12"/>
    <text x="60" y="80" font-size="10" font-weight="bold" fill="#5B8A8A">VERCEL</text>

    <!-- Browser layer -->
    <rect x="55" y="95" width="590" height="70" fill="white" stroke="#D4A574" stroke-width="2" rx="8"/>
    <text x="350" y="118" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E">Browser</text>

    <rect x="80" y="128" width="120" height="28" fill="#F5E6D3" stroke="#D4A574" stroke-width="1" rx="4"/>
    <text x="140" y="146" font-size="9" text-anchor="middle" fill="#8B6F5C">Schedule Grid</text>

    <rect x="220" y="128" width="120" height="28" fill="#F5E6D3" stroke="#D4A574" stroke-width="1" rx="4"/>
    <text x="280" y="146" font-size="9" text-anchor="middle" fill="#8B6F5C">Chat Panel</text>

    <rect x="360" y="128" width="100" height="28" fill="#F5E6D3" stroke="#D4A574" stroke-width="1" rx="4"/>
    <text x="410" y="146" font-size="9" text-anchor="middle" fill="#8B6F5C">useChat</text>

    <rect x="480" y="128" width="140" height="28" fill="#F5E6D3" stroke="#D4A574" stroke-width="1" rx="4"/>
    <text x="550" y="146" font-size="9" text-anchor="middle" fill="#8B6F5C">Week Navigation</text>

    <!-- Arrow down -->
    <line x1="350" y1="165" x2="350" y2="188" stroke="#5B8A8A" stroke-width="2" marker-end="url(#ac)"/>

    <!-- API Route layer -->
    <rect x="200" y="192" width="300" height="40" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="2" rx="6"/>
    <text x="350" y="217" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Next.js API Routes</text>
    <line x1="350" y1="232" x2="350" y2="252" stroke="#5B8A8A" stroke-width="2" marker-end="url(#ac)"/>

    <!-- Coordinator -->
    <rect x="200" y="256" width="300" height="40" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="2" rx="6"/>
    <text x="350" y="281" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Schedule Coordinator Agent</text>

    <!-- Arrows to specialists -->
    <line x1="240" y1="296" x2="120" y2="326" stroke="#5B8A8A" stroke-width="1.5" marker-end="url(#ac)"/>
    <line x1="310" y1="296" x2="270" y2="326" stroke="#5B8A8A" stroke-width="1.5" marker-end="url(#ac)"/>
    <line x1="390" y1="296" x2="420" y2="326" stroke="#5B8A8A" stroke-width="1.5" marker-end="url(#ac)"/>
    <line x1="460" y1="296" x2="560" y2="326" stroke="#5B8A8A" stroke-width="1.5" marker-end="url(#ac)"/>

    <!-- Specialist Agents -->
    <rect x="55" y="330" width="120" height="50" fill="#D4A574" stroke="#8B6F5C" stroke-width="1.5" rx="6"/>
    <text x="115" y="352" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Availability</text>
    <text x="115" y="368" font-size="8" text-anchor="middle" fill="#FFF0DD">3 tools</text>

    <rect x="195" y="330" width="120" height="50" fill="#D4A574" stroke="#8B6F5C" stroke-width="1.5" rx="6"/>
    <text x="255" y="352" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Fairness</text>
    <text x="255" y="368" font-size="8" text-anchor="middle" fill="#FFF0DD">2 tools</text>

    <rect x="355" y="330" width="120" height="50" fill="#D4A574" stroke="#8B6F5C" stroke-width="1.5" rx="6"/>
    <text x="415" y="352" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Coverage</text>
    <text x="415" y="368" font-size="8" text-anchor="middle" fill="#FFF0DD">1 tool</text>

    <rect x="505" y="330" width="130" height="50" fill="#D4A574" stroke="#8B6F5C" stroke-width="1.5" rx="6"/>
    <text x="570" y="352" font-size="10" font-weight="bold" text-anchor="middle" fill="white">Communication</text>
    <text x="570" y="368" font-size="8" text-anchor="middle" fill="#FFF0DD">2 tools</text>

    <!-- Database and AI Gateway -->
    <line x1="200" y1="380" x2="200" y2="408" stroke="#8B6F5C" stroke-width="1.5" stroke-dasharray="4,3"/>
    <line x1="350" y1="380" x2="350" y2="408" stroke="#8B6F5C" stroke-width="1.5" stroke-dasharray="4,3"/>

    <rect x="55" y="412" width="280" height="35" fill="#8B6F5C" stroke="#5C4538" stroke-width="2" rx="6"/>
    <text x="195" y="434" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Neon Postgres Database</text>

    <rect x="365" y="412" width="270" height="35" fill="#8B6F5C" stroke="#5C4538" stroke-width="2" rx="6"/>
    <text x="500" y="434" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Vercel AI Gateway</text>
  </g>
</svg>
