<svg viewBox="0 0 700 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="250" fill="#FFF8F0"/>
  <text x="350" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">Same Code, Different Database</text>

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Left: Development -->
    <rect x="40" y="60" width="280" height="150" fill="#F5E6D3" stroke="#D4A574" stroke-width="2" rx="8"/>
    <text x="180" y="88" font-size="14" font-weight="bold" text-anchor="middle" fill="#8B6F5C">Development</text>
    <text x="180" y="105" font-size="10" text-anchor="middle" fill="#5B5B5B">Your laptop</text>

    <!-- Laptop icon -->
    <rect x="125" y="120" width="110" height="70" fill="white" stroke="#D4A574" stroke-width="2" rx="6"/>
    <text x="180" y="150" font-size="11" font-weight="bold" text-anchor="middle" fill="#D4A574">sql.js</text>
    <text x="180" y="165" font-size="9" text-anchor="middle" fill="#5B5B5B">SQLite in memory</text>
    <text x="180" y="178" font-size="9" text-anchor="middle" fill="#5B5B5B">Fast, no setup</text>

    <!-- Middle: Same API -->
    <rect x="270" y="110" width="160" height="50" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="2" rx="20"/>
    <text x="350" y="132" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Same API</text>
    <text x="350" y="148" font-size="9" text-anchor="middle" fill="#C8E0E0">getAllEmployees()</text>

    <!-- Right: Production -->
    <rect x="380" y="60" width="280" height="150" fill="#E8EDE8" stroke="#5B8A8A" stroke-width="2" rx="8"/>
    <text x="520" y="88" font-size="14" font-weight="bold" text-anchor="middle" fill="#3D6B6B">Production</text>
    <text x="520" y="105" font-size="10" text-anchor="middle" fill="#5B5B5B">Vercel + Neon</text>

    <!-- Cloud icon -->
    <rect x="465" y="120" width="110" height="70" fill="white" stroke="#5B8A8A" stroke-width="2" rx="6"/>
    <text x="520" y="150" font-size="11" font-weight="bold" text-anchor="middle" fill="#5B8A8A">Neon</text>
    <text x="520" y="165" font-size="9" text-anchor="middle" fill="#5B5B5B">Serverless Postgres</text>
    <text x="520" y="178" font-size="9" text-anchor="middle" fill="#5B5B5B">Scales, persists</text>

    <!-- Bottom note -->
    <text x="350" y="235" font-size="11" text-anchor="middle" fill="#5B5B5B">The app doesn't know or care which one is running. The code is identical.</text>
  </g>
</svg>
