<svg viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="380" fill="#FFF8F0"/>
  <text x="350" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">The Schedule Grid</text>

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Browser chrome -->
    <rect x="40" y="50" width="620" height="310" fill="white" stroke="#D4A574" stroke-width="2" rx="8"/>
    <!-- URL bar -->
    <rect x="40" y="50" width="620" height="30" fill="#F5E6D3" stroke="#D4A574" stroke-width="2" rx="8"/>
    <rect x="40" y="65" width="620" height="15" fill="#F5E6D3"/>
    <circle cx="60" cy="65" r="5" fill="#D4A574" opacity="0.5"/>
    <circle cx="78" cy="65" r="5" fill="#D4A574" opacity="0.5"/>
    <circle cx="96" cy="65" r="5" fill="#D4A574" opacity="0.5"/>
    <rect x="140" y="58" width="260" height="16" fill="white" stroke="#D4A574" stroke-width="1" rx="3"/>
    <text x="270" y="70" font-size="8" text-anchor="middle" fill="#5B5B5B">localhost:3000</text>

    <!-- App header -->
    <text x="70" y="105" font-size="16" font-weight="bold" fill="#6B2D3E">Fabulosa Books</text>
    <text x="70" y="120" font-size="9" fill="#5B5B5B">Employee Schedule</text>

    <!-- Week nav bar -->
    <rect x="55" y="130" width="590" height="28" fill="#292524" rx="4"/>
    <text x="90" y="148" font-size="9" fill="#D4A574">← Prev</text>
    <text x="350" y="149" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Week of Apr 6</text>
    <text x="610" y="148" font-size="9" fill="#D4A574">Next →</text>

    <!-- Table header -->
    <rect x="55" y="162" width="590" height="22" fill="#292524" rx="0"/>
    <text x="95" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Shift</text>
    <text x="160" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Sun</text>
    <text x="230" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Mon</text>
    <text x="300" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Tue</text>
    <text x="370" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Wed</text>
    <text x="440" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Thu</text>
    <text x="510" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Fri</text>
    <text x="580" y="177" font-size="8" font-weight="bold" text-anchor="middle" fill="white">Sat</text>

    <!-- Opening row -->
    <rect x="55" y="184" width="70" height="40" fill="#FFF8F0" stroke="#e5e5e5" stroke-width="1"/>
    <text x="90" y="200" font-size="7" font-weight="bold" text-anchor="middle" fill="#6B2D3E">Opening</text>
    <text x="90" y="212" font-size="7" text-anchor="middle" fill="#5B5B5B">10am–4pm</text>

    <!-- Filled cells (Opening) -->
    <rect x="125" y="184" width="70" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="133" y="192" width="54" height="24" fill="#D4A574" rx="3"/>
    <text x="160" y="208" font-size="8" text-anchor="middle" fill="white">Alvin</text>

    <rect x="195" y="184" width="70" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="203" y="192" width="54" height="24" fill="#D4A574" rx="3"/>
    <text x="230" y="208" font-size="8" text-anchor="middle" fill="white">Melissa</text>

    <rect x="265" y="184" width="70" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="273" y="192" width="54" height="24" fill="#D4A574" rx="3"/>
    <text x="300" y="208" font-size="8" text-anchor="middle" fill="white">Dylan</text>

    <rect x="335" y="184" width="70" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="343" y="192" width="54" height="24" fill="#FFF8F0" stroke="#D4A574" stroke-width="1" rx="3"/>
    <text x="370" y="208" font-size="7" text-anchor="middle" fill="#8B6F5C">Unassigned</text>

    <rect x="405" y="184" width="70" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="413" y="192" width="54" height="24" fill="#D4A574" rx="3"/>
    <text x="440" y="208" font-size="8" text-anchor="middle" fill="white">Marcus</text>

    <rect x="475" y="184" width="70" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="483" y="192" width="54" height="24" fill="#D4A574" rx="3"/>
    <text x="510" y="208" font-size="8" text-anchor="middle" fill="white">Joel</text>

    <rect x="545" y="184" width="100" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <rect x="553" y="192" width="84" height="24" fill="#D4A574" rx="3"/>
    <text x="595" y="208" font-size="8" text-anchor="middle" fill="white">Billy</text>

    <!-- Mid row -->
    <rect x="55" y="224" width="70" height="40" fill="#FFF8F0" stroke="#e5e5e5" stroke-width="1"/>
    <text x="90" y="240" font-size="7" font-weight="bold" text-anchor="middle" fill="#6B2D3E">Mid</text>
    <text x="90" y="252" font-size="7" text-anchor="middle" fill="#5B5B5B">12pm–6pm</text>

    <rect x="125" y="224" width="520" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <text x="350" y="249" font-size="9" text-anchor="middle" fill="#D4A574" font-style="italic">... more shift assignments ...</text>

    <!-- Closing row -->
    <rect x="55" y="264" width="70" height="40" fill="#FFF8F0" stroke="#e5e5e5" stroke-width="1"/>
    <text x="90" y="280" font-size="7" font-weight="bold" text-anchor="middle" fill="#6B2D3E">Closing</text>
    <text x="90" y="292" font-size="7" text-anchor="middle" fill="#5B5B5B">2pm–8/9pm</text>

    <rect x="125" y="264" width="520" height="40" fill="white" stroke="#e5e5e5" stroke-width="1"/>
    <text x="350" y="289" font-size="9" text-anchor="middle" fill="#D4A574" font-style="italic">... more shift assignments ...</text>
  </g>
</svg>
