<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="420" fill="#FFF8F0"/>
  <text x="350" y="35" font-size="22" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">Multi-Agent Architecture</text>
  <text x="350" y="55" font-size="11" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">Four specialist agents coordinated by a central orchestrator</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5B8A8A"/>
    </marker>
    <marker id="arr-back" markerWidth="8" markerHeight="8" refX="1" refY="3" orient="auto">
      <polygon points="8 0, 0 3, 8 6" fill="#D4A574"/>
    </marker>
  </defs>

  <!-- User -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="275" y="75" width="150" height="45" fill="white" stroke="#8B6F5C" stroke-width="2" rx="6"/>
    <text x="350" y="103" font-size="13" font-weight="bold" text-anchor="middle" fill="#6B2D3E">User</text>
  </g>

  <!-- Arrow: User → Coordinator -->
  <line x1="350" y1="120" x2="350" y2="155" stroke="#5B8A8A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Coordinator -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="225" y="160" width="250" height="55" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="2" rx="8"/>
    <text x="350" y="185" font-size="14" font-weight="bold" text-anchor="middle" fill="white">Schedule Coordinator</text>
    <text x="350" y="202" font-size="10" text-anchor="middle" fill="#C8E0E0">Orchestrates the specialists</text>
  </g>

  <!-- Arrows: Coordinator → Agents -->
  <line x1="270" y1="215" x2="120" y2="275" stroke="#5B8A8A" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="320" y1="215" x2="290" y2="275" stroke="#5B8A8A" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="380" y1="215" x2="410" y2="275" stroke="#5B8A8A" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="430" y1="215" x2="580" y2="275" stroke="#5B8A8A" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Agent 1: Availability -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="30" y="280" width="150" height="70" fill="#D4A574" stroke="#8B6F5C" stroke-width="2" rx="8"/>
    <text x="105" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Availability</text>
    <text x="105" y="322" font-size="10" text-anchor="middle" fill="#FFF0DD">Who's free?</text>
    <text x="105" y="340" font-size="9" text-anchor="middle" fill="#FFF0DD">getEmployees, getSchedule</text>
  </g>

  <!-- Agent 2: Fairness -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="210" y="280" width="150" height="70" fill="#D4A574" stroke="#8B6F5C" stroke-width="2" rx="8"/>
    <text x="285" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Fairness</text>
    <text x="285" y="322" font-size="10" text-anchor="middle" fill="#FFF0DD">Is it equitable?</text>
    <text x="285" y="340" font-size="9" text-anchor="middle" fill="#FFF0DD">distribution, history</text>
  </g>

  <!-- Agent 3: Coverage -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="390" y="280" width="150" height="70" fill="#D4A574" stroke="#8B6F5C" stroke-width="2" rx="8"/>
    <text x="465" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Coverage</text>
    <text x="465" y="322" font-size="10" text-anchor="middle" fill="#FFF0DD">Fully staffed?</text>
    <text x="465" y="340" font-size="9" text-anchor="middle" fill="#FFF0DD">validateCoverage</text>
  </g>

  <!-- Agent 4: Communication -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="520" y="280" width="150" height="70" fill="#D4A574" stroke="#8B6F5C" stroke-width="2" rx="8"/>
    <text x="595" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Communication</text>
    <text x="595" y="322" font-size="10" text-anchor="middle" fill="#FFF0DD">Draft messages</text>
    <text x="595" y="340" font-size="9" text-anchor="middle" fill="#FFF0DD">summaries, schedules</text>
  </g>

  <!-- Database -->
  <g font-family="system-ui, -apple-system, sans-serif">
    <rect x="225" y="380" width="250" height="35" fill="#8B6F5C" stroke="#5C4538" stroke-width="2" rx="6"/>
    <text x="350" y="403" font-size="12" font-weight="bold" text-anchor="middle" fill="white">Neon Database</text>
  </g>

  <!-- Arrows: Agents → Database -->
  <line x1="105" y1="350" x2="250" y2="380" stroke="#8B6F5C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="285" y1="350" x2="310" y2="380" stroke="#8B6F5C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="465" y1="350" x2="400" y2="380" stroke="#8B6F5C" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="595" y1="350" x2="450" y2="380" stroke="#8B6F5C" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
