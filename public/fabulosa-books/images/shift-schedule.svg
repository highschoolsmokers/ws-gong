<svg viewBox="0 0 700 350" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="700" height="350" fill="#FFF8F0"/>

  <!-- Title -->
  <text x="350" y="35" font-size="28" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">
    Daily Shift Schedule
  </text>

  <!-- Subtitle -->
  <text x="350" y="60" font-size="12" text-anchor="middle" fill="#5B5B5B" font-family="system-ui, -apple-system, sans-serif">
    How our three shifts overlap on a typical day
  </text>

  <!-- Timeline axis -->
  <!-- Horizontal line -->
  <line x1="80" y1="150" x2="650" y2="150" stroke="#8B6F5C" stroke-width="2"/>

  <!-- Time labels -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6B2D3E">
    <!-- 10am -->
    <line x1="100" y1="145" x2="100" y2="155" stroke="#8B6F5C" stroke-width="2"/>
    <text x="100" y="175" text-anchor="middle" font-weight="bold">10am</text>

    <!-- 12pm -->
    <line x1="167" y1="145" x2="167" y2="155" stroke="#8B6F5C" stroke-width="2"/>
    <text x="167" y="175" text-anchor="middle">12pm</text>

    <!-- 2pm -->
    <line x1="233" y1="145" x2="233" y2="155" stroke="#8B6F5C" stroke-width="2"/>
    <text x="233" y="175" text-anchor="middle">2pm</text>

    <!-- 4pm -->
    <line x1="300" y1="145" x2="300" y2="155" stroke="#8B6F5C" stroke-width="2"/>
    <text x="300" y="175" text-anchor="middle">4pm</text>

    <!-- 6pm -->
    <line x1="367" y1="145" x2="367" y2="155" stroke="#8B6F5C" stroke-width="2"/>
    <text x="367" y="175" text-anchor="middle">6pm</text>

    <!-- 8pm -->
    <line x1="433" y1="145" x2="433" y2="155" stroke="#8B6F5C" stroke-width="2"/>
    <text x="433" y="175" text-anchor="middle">8pm</text>

    <!-- 9pm -->
    <line x1="500" y1="145" x2="500" y2="155" stroke="#8B6F5C" stroke-width="2"/>
    <text x="500" y="175" text-anchor="middle">9pm</text>
  </g>

  <!-- Shift 1: Opening (10am–4pm) - Amber -->
  <g>
    <rect x="100" y="210" width="200" height="50" fill="#D4A574" stroke="#8B6F5C" stroke-width="2" rx="6"/>
    <text x="200" y="235" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      Opening
    </text>
    <text x="200" y="252" font-size="11" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      10am–4pm
    </text>
  </g>

  <!-- Shift 2: Mid (12pm–6pm) - Teal -->
  <g>
    <rect x="167" y="270" width="200" height="50" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="2" rx="6"/>
    <text x="267" y="295" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      Mid Shift
    </text>
    <text x="267" y="312" font-size="11" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      12pm–6pm
    </text>
  </g>

  <!-- Shift 3: Closing (2pm–8pm, extend to 9pm on Saturdays) - Brown -->
  <g>
    <!-- Solid bar 2pm-8pm -->
    <rect x="233" y="330" width="200" height="50" fill="#8B6F5C" stroke="#5C4538" stroke-width="2" rx="6"/>

    <!-- Dotted extension for Saturday 8pm-9pm -->
    <rect x="433" y="330" width="67" height="50" fill="none" stroke="#8B6F5C" stroke-width="2" stroke-dasharray="4,4" rx="6"/>

    <text x="333" y="355" font-size="13" font-weight="bold" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      Closing
    </text>
    <text x="333" y="372" font-size="11" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif">
      2pm–8pm
    </text>

    <!-- Saturday label on dotted section -->
    <text x="467" y="355" font-size="10" text-anchor="middle" fill="#8B6F5C" font-family="system-ui, -apple-system, sans-serif">
      Sat
    </text>
    <text x="467" y="370" font-size="9" text-anchor="middle" fill="#8B6F5C" font-family="system-ui, -apple-system, sans-serif">
      +1hr
    </text>
  </g>

  <!-- Legend/Notes at bottom -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#5B5B5B">
    <text x="70" y="260" font-weight="bold" fill="#6B2D3E">
      How to read:
    </text>
    <text x="70" y="275">
      • Each colored bar = one shift
    </text>
    <text x="70" y="290">
      • Bars overlap = people work at the same time
    </text>
    <text x="70" y="305">
      • Dotted line = Special case (Saturdays close 1 hour later)
    </text>
  </g>
</svg>
