<svg viewBox="0 0 700 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="200" fill="#FFF8F0"/>
  <text x="350" y="30" font-size="22" font-weight="bold" text-anchor="middle" fill="#6B2D3E" font-family="system-ui, -apple-system, sans-serif">From Code to Live Site</text>

  <defs>
    <marker id="aw" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5B8A8A"/>
    </marker>
  </defs>

  <g font-family="system-ui, -apple-system, sans-serif">
    <!-- Step 1: Local Files -->
    <rect x="30" y="70" width="120" height="70" fill="white" stroke="#D4A574" stroke-width="2" rx="6"/>
    <text x="90" y="98" font-size="11" font-weight="bold" text-anchor="middle" fill="#6B2D3E">Your Code</text>
    <text x="90" y="115" font-size="9" text-anchor="middle" fill="#5B5B5B">Local files on</text>
    <text x="90" y="127" font-size="9" text-anchor="middle" fill="#5B5B5B">your computer</text>

    <!-- Arrow -->
    <line x1="150" y1="105" x2="185" y2="105" stroke="#5B8A8A" stroke-width="2" marker-end="url(#aw)"/>
    <text x="168" y="95" font-size="8" text-anchor="middle" fill="#5B8A8A">git commit</text>

    <!-- Step 2: Local Git -->
    <rect x="190" y="70" width="120" height="70" fill="#D4A574" stroke="#8B6F5C" stroke-width="2" rx="6"/>
    <text x="250" y="98" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Git</text>
    <text x="250" y="115" font-size="9" text-anchor="middle" fill="#FFF0DD">Saves every</text>
    <text x="250" y="127" font-size="9" text-anchor="middle" fill="#FFF0DD">version</text>

    <!-- Arrow -->
    <line x1="310" y1="105" x2="345" y2="105" stroke="#5B8A8A" stroke-width="2" marker-end="url(#aw)"/>
    <text x="328" y="95" font-size="8" text-anchor="middle" fill="#5B8A8A">git push</text>

    <!-- Step 3: GitHub -->
    <rect x="350" y="70" width="120" height="70" fill="#5B8A8A" stroke="#3D6B6B" stroke-width="2" rx="6"/>
    <text x="410" y="98" font-size="11" font-weight="bold" text-anchor="middle" fill="white">GitHub</text>
    <text x="410" y="115" font-size="9" text-anchor="middle" fill="#C8E0E0">Cloud backup</text>
    <text x="410" y="127" font-size="9" text-anchor="middle" fill="#C8E0E0">for your code</text>

    <!-- Arrow -->
    <line x1="470" y1="105" x2="505" y2="105" stroke="#5B8A8A" stroke-width="2" marker-end="url(#aw)"/>
    <text x="488" y="95" font-size="8" text-anchor="middle" fill="#5B8A8A">auto</text>

    <!-- Step 4: Vercel -->
    <rect x="510" y="70" width="160" height="70" fill="#8B6F5C" stroke="#5C4538" stroke-width="2" rx="6"/>
    <text x="590" y="98" font-size="11" font-weight="bold" text-anchor="middle" fill="white">Vercel</text>
    <text x="590" y="115" font-size="9" text-anchor="middle" fill="#E0D4C8">Auto-deploys your</text>
    <text x="590" y="127" font-size="9" text-anchor="middle" fill="#E0D4C8">live website</text>

    <!-- Bottom note -->
    <rect x="130" y="160" width="440" height="28" fill="#E8D9CB" stroke="#D4A574" stroke-width="1" rx="4"/>
    <text x="350" y="179" font-size="10" text-anchor="middle" fill="#6B2D3E">Every push to GitHub triggers an automatic deployment. Your site is always up to date.</text>
  </g>
</svg>
